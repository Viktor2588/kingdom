name: CI

# Schnelles Test-Feedback auf Feature-Branches und PRs.
# Pushes auf main werden vom Deploy-Workflow getestet (kein Doppellauf).
on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test
