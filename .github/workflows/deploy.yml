name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Berechtigungen für das GITHUB_TOKEN, damit nach Pages deployt werden darf
permissions:
  contents: read
  pages: write
  id-token: write

# Parallele Deployments verhindern; laufendes Deployment nicht abbrechen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Tests müssen grün sein, bevor nach Pages deployt wird.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Gesamtes Repo-Root als statische Seite hochladen
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
